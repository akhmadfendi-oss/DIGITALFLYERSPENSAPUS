<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Digital Pelepasan Kelas IX - SMP Negeri 1 Pringapus</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600;800&family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { DEFAULT: '#D4AF37', light: '#F9E498', dark: '#A67C00' },
                        dark: '#1A1A1A',
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                        decorative: ['Cinzel Decorative', 'cursive'],
                    },
                    backgroundImage: {
                        'batik-pattern': "url('C:/Users/SMP N1 BANYUBIRU/.gemini/antigravity/brain/635a817c-b3bf-4789-b236-053efa91278a/batik_pattern_gold_1778933929079.png')",
                        'hero-gunungan': "url('C:/Users/SMP N1 BANYUBIRU/.gemini/antigravity/brain/635a817c-b3bf-4789-b236-053efa91278a/gunungan_wayang_gold_black_1778933707637.png')",
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .bg-gold-gradient { background: linear-gradient(135deg, #A67C00 0%, #D4AF37 50%, #F9E498 100%); }
            .pentagon-clip { clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }
            .glass { background: rgba(26, 26, 26, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.2); }
            .custom-scrollbar::-webkit-scrollbar { width: 5px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }
        }
        body { @apply bg-dark text-white font-sans overflow-x-hidden; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // SVG Icons to replace Lucide and avoid crashes on file://
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2zM12 15a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>,
                eye: <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8zM12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10zM12 15a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>,
                save: <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2zM17 21v-8H7v8zM7 3v5h8V3z"/>,
                trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/>,
                plus: <path d="M12 5v14M5 12h14"/>,
                calendar: <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>,
                clock: <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>,
                mapPin: <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/>,
                users: <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>,
                chevronLeft: <polyline points="15 18 9 12 15 6"/>,
                chevronRight: <polyline points="9 18 15 12 9 6"/>,
            };
            return (
                <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const DEFAULT_DATA = {
            title: "Pelepasan Murid Kelas IX",
            school: "SMP Negeri 1 Pringapus",
            academicYear: "Tahun Ajaran 2025/2026",
            tagline: "Berakar pada Budaya, Bertumbuh Menuju Dunia",
            slogan: "Bangga dan Membanggakan",
            date: "Sabtu, 23 Mei 2026",
            time: "07.00 WIB s.d. selesai",
            location: "Lapangan SMP Negeri 1 Pringapus",
            audience: "Murid Kelas IX dan Orang Tua/Wali Murid",
            invitationOpening: "Dengan hormat, kami mengundang Bapak/Ibu Orang Tua/Wali Murid serta seluruh Murid Kelas IX untuk hadir dalam acara Pelepasan Murid Kelas IX SMP Negeri 1 Pringapus Tahun Ajaran 2025/2026.",
            invitationBody: "Acara ini menjadi momen istimewa untuk merayakan perjalanan, perjuangan, dan kebanggaan para murid yang telah tumbuh bersama nilai budaya, karakter, dan semangat untuk melangkah menuju masa depan.",
            invitationClosing: "Kehadiran Bapak/Ibu dan seluruh murid menjadi bagian penting dari kebahagiaan dan kebanggaan bersama.",
            dresscodeBoys: "Kemeja putih, dasi, jas hitam, celana hitam, dan bersepatu",
            dresscodeGirls: "Kebaya",
            logo: null,
            gallery: [],
            schedule: [
                { time: "07.00 - 07.30", activity: "Kedatangan tamu" },
                { time: "07.30 - 08.00", activity: "Pembukaan" },
                { time: "08.00 - 08.30", activity: "Lagu Indonesia Raya" },
                { time: "08.30 - 09.30", activity: "Sambutan-sambutan" },
                { time: "09.30 - 10.30", activity: "Prosesi Pelepasan" },
                { time: "10.30 - 11.30", activity: "Pentas Seni" },
                { time: "11.30 - selesai", activity: "Penutup & Foto" }
            ]
        };

        const compressImage = (base64, maxWidth = 800) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    if (width > maxWidth) {
                        height = (maxWidth / width) * height;
                        width = maxWidth;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
            });
        };

        function App() {
            const [data, setData] = useState(DEFAULT_DATA);
            const [isEditMode, setIsEditMode] = useState(false);
            const [isPreviewMode, setIsPreviewMode] = useState(false);
            const [currentSlide, setCurrentSlide] = useState(0);
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
            
            useEffect(() => {
                const saved = localStorage.getItem('undangan_data');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        setData({ ...DEFAULT_DATA, ...parsed });
                    } catch (e) { console.error("Load failed", e); }
                }
            }, []);

            useEffect(() => {
                const timer = setInterval(() => {
                    const eventDate = new Date("2026-05-23T07:00:00").getTime();
                    const now = new Date().getTime();
                    const distance = eventDate - now;
                    if (distance > 0) {
                        setTimeLeft({
                            days: Math.floor(distance / (1000 * 60 * 60 * 24)),
                            hours: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                            minutes: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                            seconds: Math.floor((distance % (1000 * 60)) / 1000),
                        });
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const saveChanges = () => {
                try {
                    localStorage.setItem('undangan_data', JSON.stringify(data));
                    alert("Berhasil disimpan!");
                } catch (e) {
                    alert("Gagal menyimpan: Ukuran foto terlalu besar. Silakan hapus beberapa foto galeri.");
                }
            };

            const handleFileUpload = async (e, type) => {
                const files = Array.from(e.target.files);
                for (const file of files) {
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        const compressed = await compressImage(ev.target.result);
                        if (type === 'logo') setData(prev => ({ ...prev, logo: compressed }));
                        else setData(prev => ({ ...prev, gallery: [...prev.gallery, compressed].slice(-8) })); // Limit to 8 images
                    };
                    reader.readAsDataURL(file);
                }
            };

            useEffect(() => {
                if (data.gallery.length > 1 && !isEditMode) {
                    const timer = setInterval(() => setCurrentSlide(p => (p + 1) % data.gallery.length), 4000);
                    return () => clearInterval(timer);
                }
            }, [data.gallery.length, isEditMode]);

            return (
                <div className="min-h-screen relative bg-dark">
                    {/* TOGGLES */}
                    <div className="fixed bottom-6 right-6 z-[100] flex flex-col items-end gap-3">
                        {!isPreviewMode && (
                            <button onClick={() => setIsEditMode(!isEditMode)} className="bg-gold text-dark font-black py-4 px-8 rounded-full shadow-2xl flex items-center gap-3 active:scale-90 transition-all">
                                <Icon name={isEditMode ? "trash" : "settings"} className="w-5 h-5" />
                                {isEditMode ? "TUTUP EDITOR" : "EDIT DATA"}
                            </button>
                        )}
                        <button onClick={() => { setIsPreviewMode(!isPreviewMode); setIsEditMode(false); }} className="bg-white/10 backdrop-blur-xl text-white font-bold py-3 px-6 rounded-full border border-white/20 flex items-center gap-2">
                            <Icon name="eye" className="w-4 h-4" />
                            {isPreviewMode ? "KELUAR PREVIEW" : "LIHAT PREVIEW"}
                        </button>
                    </div>

                    {/* SIDEBAR EDITOR */}
                    {isEditMode && (
                        <div className="fixed inset-y-0 left-0 w-full md:w-[420px] bg-[#151515] z-[90] shadow-2xl border-r border-gold/30 flex flex-col fade-in">
                            <div className="p-8 border-b border-white/5 flex justify-between items-center">
                                <h2 className="text-xl font-decorative text-gold font-black">PENGATURAN</h2>
                                <button onClick={() => setIsEditMode(false)} className="text-white/20 hover:text-white"><Icon name="trash" className="w-5 h-5" /></button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-8 space-y-8 custom-scrollbar pb-40">
                                <section className="space-y-4">
                                    <h3 className="text-gold text-[10px] font-black tracking-widest uppercase opacity-50">Teks Utama</h3>
                                    <input type="text" value={data.title} onChange={e => setData({...data, title: e.target.value})} className="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white outline-none focus:border-gold" />
                                    <input type="text" value={data.school} onChange={e => setData({...data, school: e.target.value})} className="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white outline-none focus:border-gold" />
                                    <input type="text" value={data.tagline} onChange={e => setData({...data, tagline: e.target.value})} className="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white outline-none focus:border-gold" />
                                </section>
                                <section className="space-y-4">
                                    <h3 className="text-gold text-[10px] font-black tracking-widest uppercase opacity-50">Logo & Galeri</h3>
                                    <div className="flex gap-4 items-center bg-white/5 p-4 rounded-xl">
                                        <div className="w-16 h-16 bg-dark rounded border border-gold/20 flex items-center justify-center overflow-hidden">
                                            {data.logo ? <img src={data.logo} className="w-full h-full object-contain" /> : <Icon name="image" className="text-white/10" />}
                                        </div>
                                        <input type="file" onChange={e => handleFileUpload(e, 'logo')} className="hidden" id="logo-up" />
                                        <label htmlFor="logo-up" className="bg-gold text-dark text-[10px] font-black py-2 px-4 rounded cursor-pointer">UPLOAD LOGO</label>
                                    </div>
                                    <div className="space-y-4">
                                        <input type="file" multiple onChange={e => handleFileUpload(e, 'gallery')} className="hidden" id="gal-up" />
                                        <label htmlFor="gal-up" className="block w-full py-8 border-2 border-dashed border-white/10 rounded-xl text-center cursor-pointer hover:border-gold text-[10px] font-black text-white/40">TAMBAH FOTO GALERI (MAKS 8)</label>
                                        <div className="grid grid-cols-4 gap-2">
                                            {data.gallery.map((img, i) => (
                                                <div key={i} className="relative aspect-square rounded overflow-hidden border border-white/10 group">
                                                    <img src={img} className="w-full h-full object-cover" />
                                                    <button onClick={() => removeGalleryItem(i)} className="absolute inset-0 bg-red-600/80 opacity-0 group-hover:opacity-100 flex items-center justify-center"><Icon name="trash" className="w-4 h-4" /></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </section>
                            </div>
                            <div className="absolute bottom-0 left-0 w-full p-6 bg-[#1a1a1a] border-t border-gold/20 shadow-2xl flex gap-3">
                                <button onClick={saveChanges} className="flex-1 bg-gold text-dark font-black py-4 rounded-xl flex items-center justify-center gap-2">
                                    <Icon name="save" className="w-5 h-5" /> SIMPAN PERUBAHAN
                                </button>
                                <button onClick={resetToDefault} className="bg-white/5 text-white/40 p-4 rounded-xl"><Icon name="trash" className="w-5 h-5" /></button>
                            </div>
                        </div>
                    )}

                    {/* MAIN CONTENT */}
                    <main className={`transition-all duration-700 ${isEditMode ? 'md:pl-[420px]' : ''}`}>
                        <section className="relative h-screen flex flex-col items-center justify-center text-center px-6 overflow-hidden">
                            <div className="absolute inset-0 bg-hero-gunungan bg-no-repeat bg-center bg-contain opacity-20 z-10 scale-125"></div>
                            <div className="absolute inset-0 bg-gradient-to-b from-dark via-transparent to-dark z-20"></div>
                            <div className="relative z-30 mb-8 fade-in">
                                <div className="w-32 h-32 md:w-48 md:h-48 pentagon-clip bg-gold-gradient p-1">
                                    <div className="w-full h-full pentagon-clip bg-dark flex items-center justify-center">
                                        {data.logo ? <img src={data.logo} className="w-[85%] h-[85%] object-contain" /> : <Icon name="image" className="text-gold w-12 h-12" />}
                                    </div>
                                </div>
                            </div>
                            <div className="relative z-30 space-y-4 max-w-4xl px-4">
                                <h2 className="text-gold font-decorative text-lg md:text-2xl uppercase tracking-[0.4em]">{data.title}</h2>
                                <h1 className="text-4xl md:text-8xl font-decorative font-black text-white leading-tight">{data.school}</h1>
                                <p className="text-gold-light text-lg md:text-2xl font-medium tracking-widest">{data.academicYear}</p>
                                <p className="italic text-white/70 text-lg md:text-3xl font-serif max-w-2xl mx-auto leading-relaxed">"{data.tagline}"</p>
                            </div>
                            <div className="relative z-30 mt-12 flex gap-6 md:gap-10">
                                {[{l:"HARI",v:timeLeft.days},{l:"JAM",v:timeLeft.hours},{l:"MENIT",v:timeLeft.minutes},{l:"DETIK",v:timeLeft.seconds}].map((t,i)=>(
                                    <div key={i}><div className="text-3xl md:text-6xl font-black text-gold tabular-nums leading-none">{String(t.v).padStart(2,'0')}</div><div className="text-[10px] font-black tracking-widest text-white/30">{t.l}</div></div>
                                ))}
                            </div>
                        </section>

                        <section className="py-24 px-6 relative bg-dark">
                            <div className="absolute inset-0 bg-batik-pattern opacity-5 pointer-events-none"></div>
                            <div className="max-w-3xl mx-auto glass p-10 md:p-20 rounded-[2rem] border-2 border-gold/30 text-center relative overflow-hidden">
                                <div className="relative z-10 space-y-8">
                                    <p className="text-gold font-serif text-lg md:text-xl leading-relaxed italic">{data.invitationOpening}</p>
                                    <p className="text-white text-xl md:text-3xl font-decorative leading-snug">{data.invitationBody}</p>
                                    <p className="text-gold font-serif text-lg md:text-xl leading-relaxed italic">{data.invitationClosing}</p>
                                </div>
                            </div>
                        </section>

                        <section className="py-24 px-6 bg-[#111]">
                            <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                {[{i:"calendar",l:"TANGGAL",v:data.date},{i:"clock",l:"WAKTU",v:data.time},{i:"mapPin",l:"LOKASI",v:data.location},{i:"users",l:"AUDIENS",v:data.audience}].map((item,i)=>(
                                    <div key={i} className="glass p-8 rounded-2xl text-center group hover:border-gold transition-all">
                                        <div className="w-16 h-16 bg-gold/10 rounded-xl flex items-center justify-center mx-auto mb-6 group-hover:bg-gold transition-all">
                                            <Icon name={item.i} className="text-gold group-hover:text-dark w-8 h-8" />
                                        </div>
                                        <h3 className="text-gold text-[10px] font-black tracking-widest mb-2 opacity-50 uppercase">{item.l}</h3>
                                        <p className="text-lg text-white font-bold">{item.v}</p>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section className="py-24 bg-dark">
                            <h2 className="text-center text-gold font-decorative text-3xl md:text-6xl mb-16 italic">Galeri Kenangan</h2>
                            {data.gallery.length > 0 ? (
                                <div className="max-w-5xl mx-auto px-6">
                                    <div className="relative aspect-video rounded-3xl overflow-hidden shadow-2xl border-2 border-gold/20">
                                        {data.gallery.map((img,i)=>(
                                            <div key={i} className={`absolute inset-0 transition-opacity duration-1000 ${currentSlide===i?'opacity-100':'opacity-0'}`}>
                                                <img src={img} className="w-full h-full object-cover" />
                                                <div className="absolute inset-0 bg-gradient-to-t from-dark/80 to-transparent"></div>
                                            </div>
                                        ))}
                                        <button onClick={()=>setCurrentSlide(p=>(p-1+data.gallery.length)%data.gallery.length)} className="absolute left-4 top-1/2 -translate-y-1/2 z-20 bg-dark/50 p-3 rounded-full hover:bg-gold transition-all"><Icon name="chevronLeft" className="text-white hover:text-dark" /></button>
                                        <button onClick={()=>setCurrentSlide(p=>(p+1)%data.gallery.length)} className="absolute right-4 top-1/2 -translate-y-1/2 z-20 bg-dark/50 p-3 rounded-full hover:bg-gold transition-all"><Icon name="chevronRight" className="text-white hover:text-dark" /></button>
                                    </div>
                                </div>
                            ) : (
                                <div className="max-w-3xl mx-auto px-6 text-center py-20 border-2 border-dashed border-gold/10 rounded-3xl glass text-gold/30 italic">Upload foto di panel admin</div>
                            )}
                        </section>

                        <footer className="py-32 px-6 text-center border-t border-gold/10 relative">
                            <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-full h-full bg-hero-gunungan bg-no-repeat bg-bottom bg-contain opacity-5 pointer-events-none"></div>
                            <div className="relative z-10 space-y-8">
                                <div className="w-20 h-20 pentagon-clip bg-gold-gradient p-0.5 mx-auto">
                                    <div className="w-full h-full pentagon-clip bg-dark flex items-center justify-center">
                                        {data.logo ? <img src={data.logo} className="w-[80%] h-[80%] object-contain" /> : <Icon name="image" />}
                                    </div>
                                </div>
                                <h4 className="text-2xl font-decorative text-gold font-black">{data.school}</h4>
                                <p className="text-gold-light font-serif text-lg tracking-[0.3em] uppercase italic opacity-60">{data.slogan}</p>
                                <div className="pt-10 text-white/20 text-[10px] tracking-widest font-black uppercase">&copy; 2026 {data.school}</div>
                            </div>
                        </footer>
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
